<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#bdbefe",
              "on-secondary-fixed-variant": "#404178",
              "surface-tint": "#494bd6",
              "on-tertiary-fixed": "#301400",
              "secondary": "#575992",
              "on-secondary-fixed": "#13144a",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#eceef0",
              "on-error": "#ffffff",
              "surface-container-highest": "#e0e3e5",
              "tertiary-container": "#b55d00",
              "primary-fixed-dim": "#c0c1ff",
              "tertiary": "#904900",
              "error-container": "#ffdad6",
              "on-primary-fixed": "#07006c",
              "surface": "#f7f9fb",
              "outline": "#767586",
              "on-tertiary-container": "#fffbff",
              "on-primary": "#ffffff",
              "secondary-fixed-dim": "#c0c1ff",
              "primary-container": "#6063ee",
              "on-secondary": "#ffffff",
              "on-primary-container": "#fffbff",
              "surface-container-high": "#e6e8ea",
              "on-tertiary-fixed-variant": "#703700",
              "on-tertiary": "#ffffff",
              "tertiary-fixed-dim": "#ffb783",
              "error": "#ba1a1a",
              "surface-dim": "#d8dadc",
              "surface-container-low": "#f2f4f6",
              "on-secondary-container": "#494b83",
              "on-error-container": "#93000a",
              "inverse-surface": "#2d3133",
              "primary-fixed": "#e1e0ff",
              "inverse-on-surface": "#eff1f3",
              "outline-variant": "#c7c4d7",
              "background": "#f7f9fb",
              "on-surface-variant": "#464554",
              "on-background": "#191c1e",
              "surface-bright": "#f7f9fb",
              "primary": "#4648d4",
              "on-primary-fixed-variant": "#2f2ebe",
              "tertiary-fixed": "#ffdcc5",
              "inverse-primary": "#c0c1ff",
              "on-surface": "#191c1e",
              "surface-variant": "#e0e3e5",
              "secondary-fixed": "#e1e0ff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .tap-highlight-none {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-background font-body text-on-background min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="w-full top-0 px-6 py-4 flex flex-col items-center justify-center w-full max-w-md mx-auto bg-[#f7f9fb] dark:bg-slate-950">
<div class="flex items-center gap-2">
<span class="text-2xl font-bold text-[#191c1e] dark:text-white tracking-tight font-headline">SmartQueue</span>
</div>
<p class="text-on-surface-variant font-body text-sm mt-1">Skip the line, save time</p>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md px-6 py-8 pb-32">
<!-- Hero Decorative Element (Editorial Aesthetic) -->
<div class="relative w-full h-48 rounded-xl overflow-hidden mb-8 shadow-sm">
<img alt="Modern clean office lobby with soft morning light" class="w-full h-full object-cover opacity-90" data-alt="Blurred background of a modern minimal professional lounge with comfortable seating and soft diffused sunlight hitting wood surfaces" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBPhpMBs-dMLGMvGuHzB1aNTYIVCjIoxepybkSGRpEoRxWPcjKHvnYeXPN2dSK7ebaa_KhMxHnfFJfFNEbwaHk8K6nd6Sb3mJ2-CgGo4i406L2YVEKtMBtOF2bVfWM5gmoHukmB-xyl-8pfHno3C4BfHOLSxlknOg-5w5Il96jBFu036NO3BK1sofGdcuq25616F9Byi82KkU7Og21YPZUkhWFBNi9y8V--RTzn9Oa6s4Xb9DCiY12kl_WfVD8GIoFNTaHKrvsfkhWf"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/20 to-transparent"></div>
</div>
<!-- Join Queue Card -->
<div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0_20px_40px_rgba(70,72,212,0.06)]">
<h1 class="font-headline text-on-surface text-2xl font-bold mb-6">Join the Queue</h1>
<form class="space-y-6">
<!-- Full Name Input -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant px-1">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline/50" placeholder="Enter your name" type="text"/>
</div>
</div>
<!-- Service Type Dropdown -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant px-1">Service Type</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors" data-icon="business">business</span>
<select class="w-full pl-12 pr-10 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all text-on-surface appearance-none">
<option disabled="" selected="" value="">Select location</option>
<option value="hospital">Hospital Care</option>
<option value="bank">Financial Center</option>
<option value="office">Public Office</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Priority Level Radio Buttons -->
<div class="space-y-3">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant px-1 flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="flag">flag</span> Priority Level
                    </label>
<div class="grid grid-cols-1 gap-3">
<label class="relative flex items-center p-4 rounded-md bg-surface-container-low border border-transparent cursor-pointer hover:bg-surface-container-high transition-colors has-[:checked]:bg-primary/5 has-[:checked]:border-primary/20">
<input checked="" class="w-5 h-5 text-primary border-outline-variant focus:ring-primary" name="priority" type="radio" value="normal"/>
<span class="ml-3 font-body font-medium text-on-surface">Normal</span>
</label>
<label class="relative flex items-center p-4 rounded-md bg-surface-container-low border border-transparent cursor-pointer hover:bg-surface-container-high transition-colors has-[:checked]:bg-primary/5 has-[:checked]:border-primary/20">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary" name="priority" type="radio" value="senior"/>
<span class="ml-3 font-body font-medium text-on-surface">Senior / Disability</span>
</label>
<label class="relative flex items-center p-4 rounded-md bg-surface-container-low border border-transparent cursor-pointer hover:bg-surface-container-high transition-colors has-[:checked]:bg-primary/5 has-[:checked]:border-primary/20">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary" name="priority" type="radio" value="emergency"/>
<span class="ml-3 font-body font-medium text-on-surface">Emergency</span>
</label>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-headline font-bold py-5 rounded-lg active:scale-95 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit">
                        Join Queue
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center text-on-surface-variant text-xs mt-6 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
                        You will receive your queue position instantly
                    </p>
</div>
</form>
</div>
<!-- Live Status Pulse Section -->
<div class="mt-8 flex items-center justify-center gap-3 py-4 px-6 bg-surface-container-low rounded-full w-fit mx-auto">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="text-on-surface-variant font-label text-[10px] uppercase tracking-widest font-bold">Live Queue Status</span>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_-20px_40px_rgba(70,72,212,0.08)] rounded-t-[3rem]">
<!-- Home (Inactive) -->
<a class="flex flex-col items-center justify-center text-[#464554] dark:text-slate-400 px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-90 duration-200 tap-highlight-none" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-inter text-[10px] font-medium tracking-wider uppercase">Home</span>
</a>
<!-- My Tickets (Active) -->
<a class="flex flex-col items-center justify-center bg-[#4648d4]/10 dark:bg-indigo-500/20 text-[#4648d4] dark:text-indigo-300 rounded-2xl px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-90 duration-200 tap-highlight-none" href="#">
<span class="material-symbols-outlined mb-1" data-icon="confirmation_number" style="font-variation-settings: 'FILL' 1;">confirmation_number</span>
<span class="font-inter text-[10px] font-medium tracking-wider uppercase">My Tickets</span>
</a>
<!-- Locations (Inactive) -->
<a class="flex flex-col items-center justify-center text-[#464554] dark:text-slate-400 px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-90 duration-200 tap-highlight-none" href="#">
<span class="material-symbols-outlined mb-1" data-icon="location_on">location_on</span>
<span class="font-inter text-[10px] font-medium tracking-wider uppercase">Locations</span>
</a>
<!-- Profile (Inactive) -->
<a class="flex flex-col items-center justify-center text-[#464554] dark:text-slate-400 px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-90 duration-200 tap-highlight-none" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-inter text-[10px] font-medium tracking-wider uppercase">Profile</span>
</a>
</nav>
</body></html>
